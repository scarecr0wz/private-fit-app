<!DOCTYPE html>

<html class="dark" lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FitApp - GPS Activity Tracker</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #121221;
            color: #e3e0f6;
            overflow: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-dot::after {
            content: '';
            position: absolute;
            bottom: -4px;
            width: 4px;
            height: 4px;
            background-color: #44e7c3;
            border-radius: 9999px;
        }
        .glass-overlay {
            background: rgba(37, 37, 53, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .stat-divider {
            width: 1px;
            height: 24px;
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "tertiary-fixed-dim": "#ffb0ca",
                      "primary-fixed": "#e3dfff",
                      "on-secondary-fixed-variant": "#005142",
                      "on-tertiary": "#640036",
                      "inverse-surface": "#e3e0f6",
                      "secondary-fixed": "#5efbd6",
                      "on-primary-fixed-variant": "#3622ca",
                      "tertiary": "#ffb0ca",
                      "on-secondary": "#00382d",
                      "error-container": "#93000a",
                      "on-surface-variant": "#c7c4d8",
                      "on-error-container": "#ffdad6",
                      "surface-variant": "#333344",
                      "primary-container": "#8781ff",
                      "surface-bright": "#383848",
                      "surface": "#121221",
                      "surface-container-highest": "#333344",
                      "on-primary-container": "#1b0091",
                      "on-secondary-fixed": "#002019",
                      "error": "#ffb4ab",
                      "primary-fixed-dim": "#c4c0ff",
                      "on-error": "#690005",
                      "surface-dim": "#121221",
                      "secondary": "#44e7c3",
                      "tertiary-container": "#f1589a",
                      "on-primary": "#2000a4",
                      "on-tertiary-fixed-variant": "#8d004e",
                      "on-primary-fixed": "#100069",
                      "outline": "#918fa1",
                      "surface-container": "#1e1e2e",
                      "on-tertiary-fixed": "#3e001f",
                      "on-secondary-container": "#004f40",
                      "surface-tint": "#c4c0ff",
                      "outline-variant": "#464555",
                      "surface-container-low": "#1a1a2a",
                      "tertiary-fixed": "#ffd9e3",
                      "inverse-primary": "#4f44e2",
                      "surface-container-lowest": "#0c0d1c",
                      "on-tertiary-container": "#58002f",
                      "secondary-fixed-dim": "#37debb",
                      "on-background": "#e3e0f6",
                      "secondary-container": "#01caa8",
                      "primary": "#c4c0ff",
                      "surface-container-high": "#292839",
                      "inverse-on-surface": "#2f2f3f",
                      "background": "#121221",
                      "on-surface": "#e3e0f6"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "base": "4px",
                      "lg": "24px",
                      "md": "16px",
                      "container-margin": "20px",
                      "xs": "8px",
                      "xl": "32px",
                      "gutter": "16px",
                      "sm": "12px"
              },
              "fontFamily": {
                      "headline-lg": ["Inter"],
                      "title-md": ["Inter"],
                      "label-md": ["Inter"],
                      "display-lg": ["Inter"],
                      "headline-lg-mobile": ["Inter"],
                      "body-md": ["Inter"],
                      "caption": ["Inter"]
              },
              "fontSize": {
                      "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                      "title-md": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                      "label-md": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                      "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                      "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                      "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                      "caption": ["12px", {"lineHeight": "16px", "fontWeight": "400"}]
              }
            },
          },
        }
      </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface antialiased">
<!-- Header Map Navigation -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-container-margin py-sm bg-gradient-to-b from-background to-transparent">
<div class="flex items-center gap-md">
<button class="w-10 h-10 rounded-full flex items-center justify-center bg-surface-container/80 backdrop-blur-md text-on-surface">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-extrabold text-primary">Outdoor Run</h1>
</div>
<div class="flex gap-sm">
<button class="w-10 h-10 rounded-full flex items-center justify-center bg-surface-container/80 backdrop-blur-md text-on-surface">
<span class="material-symbols-outlined">settings_suggest</span>
</button>
<button class="w-10 h-10 rounded-full flex items-center justify-center bg-surface-container/80 backdrop-blur-md text-on-surface">
<span class="material-symbols-outlined">my_location</span>
</button>
</div>
</header>
<!-- Main Map View -->
<main class="fixed inset-0 w-full h-full">
<div class="absolute inset-0 z-0 bg-surface-container-lowest" data-location="Jakarta, Indonesia" style="">
<img class="w-full h-full object-cover opacity-60" data-alt="A high-contrast dark-themed satellite map of a modern city at night with glowing teal lines representing a running path. The map shows detailed urban grids in deep charcoal and navy tones, punctuated by neon accents and smooth topographical details. The aesthetic is clean, professional, and optimized for high-visibility during physical activity in a fitness tracking app." src="https://lh3.googleusercontent.com/aida-public/AB6AXuClG0o5U67X5T7sa5LGimqYrqIWI_r5gW1AL-Hn_yYSV8qNZh4Nj8iY53MUDsepuIXAdaTotzp6tozsnGX-B-9O5c0rV50ynsV3XQWs5iUxtQo_p7o-yLJVO6yXUDIYNdl4v8Hdrc1_7eQVN1oZ6ennVHQms-FA4GfZudV0Sdx7YNThTDoy-4dcP1QSp9s-Vb3MGKl_4hFACiToHZes8jMnV-S8tTeXR2fIcLrTMZiRuxZK3clCerGD_EMT5NQONrB8bAHcA9o5Ohs"/>
</div>
<!-- Live Path SVG Overlay (Simulated) -->
<svg class="absolute inset-0 z-10 w-full h-full pointer-events-none" viewbox="0 0 400 800">
<path class="animate-[dash_5s_ease-in-out_infinite]" d="M100,500 L120,480 L180,490 L220,440 L280,450 L310,400" fill="none" stroke="#44e7c3" stroke-linecap="round" stroke-linejoin="round" stroke-width="4" style="stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: dash 3s linear forwards;"></path>
<circle cx="310" cy="400" fill="#44e7c3" r="6">
<animate attributename="r" dur="1.5s" repeatcount="indefinite" values="6;10;6"></animate>
<animate attributename="opacity" dur="1.5s" repeatcount="indefinite" values="1;0.4;1"></animate>
</circle>
</svg>
<!-- Stats Overlay Card -->
<div class="absolute bottom-[100px] left-container-margin right-container-margin z-30">
<div class="glass-overlay rounded-xl px-gutter py-lg shadow-2xl flex flex-col gap-lg">
<div class="grid grid-cols-4 items-center">
<!-- Duration -->
<div class="flex flex-col items-center">
<span class="font-caption text-caption text-on-surface-variant uppercase tracking-wider mb-xs">Duration</span>
<span class="font-title-md text-title-md text-on-surface font-bold">00:45:12</span>
</div>
<!-- Jarak -->
<div class="flex flex-col items-center border-l border-white/10">
<span class="font-caption text-caption text-on-surface-variant uppercase tracking-wider mb-xs">Jarak</span>
<span class="font-title-md text-title-md text-on-surface font-bold">5.2 km</span>
</div>
<!-- Pace -->
<div class="flex flex-col items-center border-l border-white/10">
<span class="font-caption text-caption text-on-surface-variant uppercase tracking-wider mb-xs">Pace</span>
<span class="font-title-md text-title-md text-on-surface font-bold">8:40</span>
</div>
<!-- Kalori -->
<div class="flex flex-col items-center border-l border-white/10">
<span class="font-caption text-caption text-on-surface-variant uppercase tracking-wider mb-xs">Kalori</span>
<span class="font-title-md text-title-md text-on-surface font-bold">320 kcal</span>
</div>
</div>
<!-- Action Controls -->
<div class="flex justify-center items-center gap-xl relative h-16" id="control-container">
<!-- Initial State: Mulai FAB -->
<button class="absolute inset-x-0 mx-auto w-40 h-14 bg-secondary text-on-secondary rounded-full font-title-md text-title-md font-extrabold flex items-center justify-center gap-xs shadow-[0_0_20px_rgba(68,231,195,0.4)] transition-all duration-300 active:scale-95" id="btn-start">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
                        Mulai
                    </button>
<!-- Active State: Pause & Stop (Hidden by default) -->
<div class="hidden flex items-center gap-xl" id="active-controls">
<button class="w-14 h-14 rounded-full bg-surface-container text-on-surface flex items-center justify-center border border-outline-variant/30 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-[28px]">pause</span>
</button>
<button class="w-16 h-16 rounded-full bg-error text-on-error flex items-center justify-center shadow-[0_0_15px_rgba(255,180,171,0.3)] active:scale-90 transition-transform">
<span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 1;">stop</span>
</button>
<button class="w-14 h-14 rounded-full bg-surface-container text-on-surface flex items-center justify-center border border-outline-variant/30 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-[28px]">camera_alt</span>
</button>
</div>
</div>
</div>
</div>
</main>
<!-- Bottom Navigation Shell -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pt-sm pb-lg bg-surface/80 dark:bg-surface/80 backdrop-blur-md border-t border-white/10">
<div class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant hover:text-primary transition-colors cursor-pointer">
<span class="material-symbols-outlined">today</span>
<span class="font-label-md text-label-md">Today</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant hover:text-primary transition-colors cursor-pointer">
<span class="material-symbols-outlined">restaurant</span>
<span class="font-label-md text-label-md">Food</span>
</div>
<div class="flex flex-col items-center justify-center text-secondary dark:text-secondary relative active-dot cursor-pointer">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">exercise</span>
<span class="font-label-md text-label-md">Activity</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant hover:text-primary transition-colors cursor-pointer">
<span class="material-symbols-outlined">fitness_center</span>
<span class="font-label-md text-label-md">Gym</span>
</div>
</nav>
<script>
        const btnStart = document.getElementById('btn-start');
        const activeControls = document.getElementById('active-controls');

        btnStart.addEventListener('click', () => {
            btnStart.classList.add('opacity-0', 'scale-75', 'pointer-events-none');
            setTimeout(() => {
                btnStart.classList.add('hidden');
                activeControls.classList.remove('hidden');
                activeControls.classList.add('flex', 'animate-[bounceIn_0.5s_ease-out]');
            }, 300);
        });

        // Simple animation logic for path
        const styleSheet = document.createElement("style");
        styleSheet.innerText = `
            @keyframes dash {
                to {
                    stroke-dashoffset: 0;
                }
            }
            @keyframes bounceIn {
                0% { opacity: 0; transform: scale(0.3); }
                50% { opacity: 0.9; transform: scale(1.1); }
                80% { opacity: 1; transform: scale(0.89); }
                100% { opacity: 1; transform: scale(1); }
            }
        `;
        document.head.appendChild(styleSheet);
    </script>
</body></html>
