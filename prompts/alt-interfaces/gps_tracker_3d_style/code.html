<!DOCTYPE html>

<html class="dark" lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FitApp - GPS Activity Tracker</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #121221;
            color: #e3e0f6;
            overflow: hidden;
            min-height: max(884px, 100dvh);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-dot::after {
            content: '';
            position: absolute;
            bottom: -4px;
            width: 4px;
            height: 4px;
            background-color: #44e7c3;
            border-radius: 9999px;
            box-shadow: 0 0 8px #44e7c3;
        }
        .glass-overlay-3d {
            background: linear-gradient(135deg, rgba(41, 40, 57, 0.7) 0%, rgba(30, 30, 46, 0.9) 100%);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 
                0 10px 40px -10px rgba(0, 0, 0, 0.5),
                inset 0 1px 1px rgba(255, 255, 255, 0.1);
        }
        .btn-3d-primary {
            background: linear-gradient(180deg, #5efbd6 0%, #44e7c3 50%, #01caa8 100%);
            box-shadow: 
                0 4px 0 #005142,
                0 10px 20px rgba(68, 231, 195, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.4);
            transition: all 0.1s ease;
        }
        .btn-3d-primary:active {
            transform: translateY(2px);
            box-shadow: 
                0 2px 0 #005142,
                0 5px 10px rgba(68, 231, 195, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }
        .btn-3d-secondary {
            background: linear-gradient(180deg, #333344 0%, #1e1e2e 100%);
            box-shadow: 
                0 4px 0 #0c0d1c,
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: all 0.1s ease;
        }
        .btn-3d-secondary:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #0c0d1c;
        }
        .btn-3d-error {
            background: linear-gradient(180deg, #ffb4ab 0%, #ef5350 100%);
            box-shadow: 
                0 4px 0 #93000a,
                0 10px 15px rgba(239, 83, 80, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            transition: all 0.1s ease;
        }
        .btn-3d-error:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #93000a;
        }
        .icon-btn-3d {
            box-shadow: 
                0 4px 10px rgba(0, 0, 0, 0.3),
                inset 0 1px 1px rgba(255, 255, 255, 0.1);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-container": "#1e1e2e",
                      "surface-container-high": "#292839",
                      "error-container": "#93000a",
                      "on-tertiary-fixed-variant": "#8d004e",
                      "on-surface": "#e3e0f6",
                      "on-primary-container": "#1b0091",
                      "secondary-container": "#01caa8",
                      "inverse-primary": "#4f44e2",
                      "tertiary-fixed-dim": "#ffb0ca",
                      "on-tertiary-fixed": "#3e001f",
                      "tertiary-fixed": "#ffd9e3",
                      "on-error-container": "#ffdad6",
                      "surface-container-lowest": "#0c0d1c",
                      "on-secondary": "#00382d",
                      "surface-variant": "#333344",
                      "on-secondary-fixed": "#002019",
                      "background": "#121221",
                      "outline": "#918fa1",
                      "on-primary-fixed-variant": "#3622ca",
                      "on-primary": "#2000a4",
                      "inverse-surface": "#e3e0f6",
                      "surface-tint": "#c4c0ff",
                      "on-tertiary": "#640036",
                      "surface": "#121221",
                      "outline-variant": "#464555",
                      "secondary-fixed-dim": "#37debb",
                      "error": "#ffb4ab",
                      "on-background": "#e3e0f6",
                      "surface-dim": "#121221",
                      "surface-container-highest": "#333344",
                      "secondary": "#44e7c3",
                      "primary-container": "#8781ff",
                      "on-tertiary-container": "#58002f",
                      "on-surface-variant": "#c7c4d8",
                      "on-primary-fixed": "#100069",
                      "tertiary": "#ffb0ca",
                      "on-secondary-fixed-variant": "#005142",
                      "on-secondary-container": "#004f40",
                      "on-error": "#690005",
                      "surface-container-low": "#1a1a2a",
                      "primary": "#c4c0ff",
                      "primary-fixed-dim": "#c4c0ff",
                      "secondary-fixed": "#5efbd6",
                      "tertiary-container": "#f1589a",
                      "inverse-on-surface": "#2f2f3f",
                      "surface-bright": "#383848",
                      "primary-fixed": "#e3dfff"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "base": "4px",
                      "lg": "24px",
                      "md": "16px",
                      "container-margin": "20px",
                      "xs": "8px",
                      "xl": "32px",
                      "gutter": "16px",
                      "sm": "12px"
              },
              "fontFamily": {
                      "headline-lg": ["Inter"],
                      "title-md": ["Inter"],
                      "label-md": ["Inter"],
                      "display-lg": ["Inter"],
                      "headline-lg-mobile": ["Inter"],
                      "body-md": ["Inter"],
                      "caption": ["Inter"]
              },
              "fontSize": {
                      "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                      "title-md": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                      "label-md": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                      "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                      "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                      "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                      "caption": ["12px", {"lineHeight": "16px", "fontWeight": "400"}]
              }
            },
          },
        }
      </script>
</head>
<body class="bg-background text-on-surface antialiased">
<!-- Header Map Navigation -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-container-margin py-sm bg-gradient-to-b from-background to-transparent">
<div class="flex items-center gap-md">
<button class="w-10 h-10 rounded-full flex items-center justify-center bg-surface-container/80 backdrop-blur-md text-on-surface icon-btn-3d border border-white/10">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-extrabold text-primary drop-shadow-lg">Outdoor Run</h1>
</div>
<div class="flex gap-sm">
<button class="w-10 h-10 rounded-full flex items-center justify-center bg-surface-container/80 backdrop-blur-md text-on-surface icon-btn-3d border border-white/10">
<span class="material-symbols-outlined">settings_suggest</span>
</button>
<button class="w-10 h-10 rounded-full flex items-center justify-center bg-surface-container/80 backdrop-blur-md text-on-surface icon-btn-3d border border-white/10">
<span class="material-symbols-outlined">my_location</span>
</button>
</div>
</header>
<!-- Main Map View -->
<main class="fixed inset-0 w-full h-full">
<div class="absolute inset-0 z-0 bg-surface-container-lowest">
<img alt="Dark tactical map" class="w-full h-full object-cover opacity-60" src="https://lh3.googleusercontent.com/aida-public/AB6AXuClG0o5U67X5T7sa5LGimqYrqIWI_r5gW1AL-Hn_yYSV8qNZh4Nj8iY53MUDsepuIXAdaTotzp6tozsnGX-B-9O5c0rV50ynsV3XQWs5iUxtQo_p7o-yLJVO6yXUDIYNdl4v8Hdrc1_7eQVN1oZ6ennVHQms-FA4GfZudV0Sdx7YNThTDoy-4dcP1QSp9s-Vb3MGKl_4hFACiToHZes8jMnV-S8tTeXR2fIcLrTMZiRuxZK3clCerGD_EMT5NQONrB8bAHcA9o5Ohs"/>
</div>
<!-- Live Path SVG Overlay -->
<svg class="absolute inset-0 z-10 w-full h-full pointer-events-none" viewbox="0 0 400 800">
<filter id="glow">
<fegaussianblur result="blur" stddeviation="2"></fegaussianblur>
<fecomposite in="SourceGraphic" in2="blur" operator="over"></fecomposite>
</filter>
<path class="animate-[dash_5s_ease-in-out_infinite]" d="M100,500 L120,480 L180,490 L220,440 L280,450 L310,400" fill="none" filter="url(#glow)" stroke="#44e7c3" stroke-linecap="round" stroke-linejoin="round" stroke-width="4" style="stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: dash 3s linear forwards;"></path>
<circle cx="310" cy="400" fill="#44e7c3" r="6">
<animate attributename="r" dur="1.5s" repeatcount="indefinite" values="6;10;6"></animate>
<animate attributename="opacity" dur="1.5s" repeatcount="indefinite" values="1;0.4;1"></animate>
</circle>
</svg>
<!-- Stats Overlay Card -->
<div class="absolute bottom-[110px] left-container-margin right-container-margin z-30">
<div class="glass-overlay-3d rounded-2xl px-gutter py-lg flex flex-col gap-lg">
<div class="grid grid-cols-4 items-center">
<!-- Duration -->
<div class="flex flex-col items-center">
<span class="font-caption text-caption text-on-surface-variant uppercase tracking-widest mb-xs opacity-70">Duration</span>
<span class="font-title-md text-title-md text-on-surface font-bold">00:45:12</span>
</div>
<!-- Jarak -->
<div class="flex flex-col items-center border-l border-white/5">
<span class="font-caption text-caption text-on-surface-variant uppercase tracking-widest mb-xs opacity-70">Jarak</span>
<span class="font-title-md text-title-md text-on-surface font-bold">5.2 km</span>
</div>
<!-- Pace -->
<div class="flex flex-col items-center border-l border-white/5">
<span class="font-caption text-caption text-on-surface-variant uppercase tracking-widest mb-xs opacity-70">Pace</span>
<span class="font-title-md text-title-md text-on-surface font-bold">8:40</span>
</div>
<!-- Kalori -->
<div class="flex flex-col items-center border-l border-white/5">
<span class="font-caption text-caption text-on-surface-variant uppercase tracking-widest mb-xs opacity-70">Kalori</span>
<span class="font-title-md text-title-md text-on-surface font-bold">320 kcal</span>
</div>
</div>
<!-- Action Controls -->
<div class="flex justify-center items-center relative h-16" id="control-container">
<!-- Initial State: Mulai FAB -->
<button class="absolute inset-x-0 mx-auto w-44 h-14 btn-3d-primary text-on-secondary rounded-full font-title-md text-title-md font-extrabold flex items-center justify-center gap-xs" id="btn-start">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
                    MULAI
                </button>
<!-- Active State: Pause & Stop -->
<div class="hidden flex items-center gap-xl" id="active-controls">
<button class="w-14 h-14 rounded-full btn-3d-secondary text-on-surface flex items-center justify-center border border-white/5">
<span class="material-symbols-outlined text-[28px]">pause</span>
</button>
<button class="w-16 h-16 rounded-full btn-3d-error text-on-error flex items-center justify-center">
<span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 1;">stop</span>
</button>
<button class="w-14 h-14 rounded-full btn-3d-secondary text-on-surface flex items-center justify-center border border-white/5">
<span class="material-symbols-outlined text-[28px]">camera_alt</span>
</button>
</div>
</div>
</div>
</div>
</main>
<!-- Bottom Navigation Shell -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pt-sm pb-lg bg-surface-container-lowest/90 backdrop-blur-xl border-t border-white/5">
<div class="flex flex-col items-center justify-center text-on-surface-variant/60 hover:text-primary transition-colors cursor-pointer">
<span class="material-symbols-outlined">today</span>
<span class="font-label-md text-label-md">Today</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant/60 hover:text-primary transition-colors cursor-pointer">
<span class="material-symbols-outlined">restaurant</span>
<span class="font-label-md text-label-md">Food</span>
</div>
<div class="flex flex-col items-center justify-center text-secondary relative active-dot cursor-pointer">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">exercise</span>
<span class="font-label-md text-label-md font-bold">Activity</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant/60 hover:text-primary transition-colors cursor-pointer">
<span class="material-symbols-outlined">fitness_center</span>
<span class="font-label-md text-label-md">Gym</span>
</div>
</nav>
<script>
    const btnStart = document.getElementById('btn-start');
    const activeControls = document.getElementById('active-controls');

    btnStart.addEventListener('click', () => {
        btnStart.classList.add('opacity-0', 'scale-75', 'pointer-events-none');
        setTimeout(() => {
            btnStart.classList.add('hidden');
            activeControls.classList.remove('hidden');
            activeControls.classList.add('flex', 'animate-[bounceIn_0.5s_ease-out]');
        }, 300);
    });

    const styleSheet = document.createElement("style");
    styleSheet.innerText = `
        @keyframes dash {
            to {
                stroke-dashoffset: 0;
            }
        }
        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.3) translateY(20px); }
            50% { opacity: 0.9; transform: scale(1.05) translateY(-5px); }
            80% { opacity: 1; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
    `;
    document.head.appendChild(styleSheet);
</script>
</body></html>
